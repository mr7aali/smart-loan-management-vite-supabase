<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Apply the saved theme synchronously so users never see a flash of
         the wrong color scheme. Mirrors the `lendsmart-theme` key written
         by src/hooks/use-theme.ts. -->
    <script>
      (function () {
        try {
          var saved = window.localStorage.getItem("lendsmart-theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || (saved == null && prefersDark);
          if (dark) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          } else {
            document.documentElement.style.colorScheme = "light";
          }
        } catch (error) {
          // Theme will fall back to the React default once the app mounts.
        }
      })();
    </script>

    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="apple-touch-icon" href="/images/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Performance: warm up the connections we will use first. -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Defaults below are overridden per-route by src/components/Seo.tsx and
         baked into the rendered HTML at build time by scripts/prerender.mjs.
         Keep these in sync with VITE_SITE_URL in your .env. -->
    <link rel="canonical" href="https://lendsmart.me/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="LendSmart" />
    <meta
      name="description"
      content="LendSmart is loan management software for tracking borrowers, originating loans, recording repayments, and reviewing lending reports in one secure workspace."
    />

    <meta property="og:site_name" content="LendSmart" />
    <meta
      property="og:title"
      content="LendSmart - Loan Management Software for Lenders and Microfinance"
    />
    <meta
      property="og:description"
      content="Manage borrowers, originate loans, record repayments, and review lending reports in one secure loan management platform."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lendsmart.me/" />
    <meta
      property="og:image"
      content="https://lendsmart.me/images/og-cover.png"
    />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="LendSmart - Loan Management Software for Lenders and Microfinance"
    />
    <meta
      name="twitter:description"
      content="Manage borrowers, originate loans, record repayments, and review lending reports in one secure loan management platform."
    />
    <meta
      name="twitter:image"
      content="https://lendsmart.me/images/og-cover.png"
    />

    <title>
      LendSmart - Loan Management Software for Lenders and Microfinance
    </title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
